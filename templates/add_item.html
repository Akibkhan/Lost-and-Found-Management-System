{% extends "base.html" %}
{% block content %}

<!-- Leaflet CSS/JS (INCLUDED HERE SO IT ALWAYS WORKS) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<div class="container-fluid px-3 px-md-5">
  <div class="card shadow-sm border-0 rounded-4 mt-4 mb-5"
       style="max-width: 700px; margin: auto; background-color: var(--bs-body-bg);">
    
    <div class="card-body p-4 p-md-5">
      <h3 class="text-center mb-4 fw-semibold">
        <i class="bi bi-plus-circle-dotted me-2 text-primary"></i> 
        Add a Lost or Found Item
      </h3>

      <form method="POST" enctype="multipart/form-data" action="{{ url_for('add_item') }}">

        <!-- Item Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Item Name</label>
          <input type="text" name="name" class="form-control" required placeholder="Enter item name">
        </div>

        <!-- Description -->
        <!-- Description -->
<div class="mb-3">
  <label class="form-label fw-semibold">
    Description
    <small class="text-muted">(Manual or AI-generated)</small>
  </label>

  <textarea id="description"
            name="description"
            class="form-control"
            rows="4"
            placeholder="Describe the item or enable AI"
            required></textarea>

  <!-- AI Toggle -->
  <div class="form-check form-switch mt-2">
    <input class="form-check-input"
           type="checkbox"
           id="aiToggle">
    <label class="form-check-label fw-semibold" for="aiToggle">
      🤖 Generate description using AI
    </label>
  </div>
</div>


        <!-- Upload Photo -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Upload Photo</label>
          <input type="file" name="photo" class="form-control" accept="image/*">
        </div>

        <!-- Location Search -->
        <div class="mb-3 position-relative">
          <label class="form-label fw-semibold">Location</label>
          <input type="text" id="location" name="location" class="form-control" autocomplete="off">
          <ul id="suggestions" class="list-group position-absolute w-100 shadow-sm"
              style="z-index: 2000; display: none; max-height: 200px; overflow-y: auto;"></ul>
        </div>

        <!-- Map -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Location on Map</label>
          <div id="map" style="height: 350px; border: 1px solid #ccc; border-radius: 12px;"></div>
        </div>

        <!-- Lat/Lng -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Latitude</label>
            <input type="text" id="latitude" name="latitude" class="form-control" readonly>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Longitude</label>
            <input type="text" id="longitude" name="longitude" class="form-control" readonly>
          </div>
        </div>

        <!-- Category -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Category</label>
          <select name="category_id" class="form-select" required>
            <option value="">-- Select Category --</option>
            {% for category in categories %}
              <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Status -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Item Status</label>
          <select name="status" class="form-select" required>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
        </div>

        <!-- Date -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Date</label>
          <input type="date" name="date_reported" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Submit Item
        </button>

      </form>
    </div>
  </div>
</div>

<!-- MAP + AUTOCOMPLETE JS -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    // Create Map
    var map = L.map('map').setView([26.9124, 75.7873], 13);

    // Working Tile Server (HOT)
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
        maxZoom: 20
    }).addTo(map);

    // Draggable Marker
    var marker = L.marker([26.9124, 75.7873], { draggable: true }).addTo(map);

    // Update lat/lng on drag
    marker.on("dragend", function () {
        const pos = marker.getLatLng();
        document.getElementById("latitude").value = pos.lat;
        document.getElementById("longitude").value = pos.lng;
    });

    // Click to move marker
    map.on("click", function (e) {
        marker.setLatLng(e.latlng);
        document.getElementById("latitude").value = e.latlng.lat;
        document.getElementById("longitude").value = e.latlng.lng;
    });

    // Fix blank map issue
    setTimeout(() => map.invalidateSize(true), 800);

    // Autocomplete search
    const searchBox = document.getElementById("location");
    const suggestions = document.getElementById("suggestions");

    searchBox.addEventListener("input", function () {
        let q = this.value.trim();
        if (q.length < 3) {
            suggestions.style.display = "none";
            return;
        }

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
            .then(res => res.json())
            .then(results => {
                suggestions.innerHTML = "";
                results.forEach(item => {
                    let li = document.createElement("li");
                    li.className = "list-group-item";
                    li.textContent = item.display_name;

                    li.onclick = () => {
                        searchBox.value = item.display_name;
                        marker.setLatLng([item.lat, item.lon]);
                        map.setView([item.lat, item.lon], 16);

                        document.getElementById("latitude").value = item.lat;
                        document.getElementById("longitude").value = item.lon;

                        suggestions.style.display = "none";
                    };

                    suggestions.appendChild(li);
                });

                suggestions.style.display = "block";
            });
    });
});
</script>
<script> 
 
document.getElementById("aiToggle").addEventListener("change", async function () {
    const descBox = document.getElementById("description");
    const photoInput = document.querySelector('input[name="photo"]');
    const categorySelect = document.querySelector('select[name="category_id"]');

    if (!this.checked) return;

    if (!photoInput.files.length) {
        alert("Please upload an image first");
        this.checked = false;
        return;
    }

    descBox.value = "🤖 Generating description & category...";

    const formData = new FormData();
    formData.append("photo", photoInput.files[0]);

    const response = await fetch("/generate-description", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (data.description) {
        descBox.value = data.description;
    }

    if (data.category) {
        // Match category name with dropdown
        for (let option of categorySelect.options) {
            if (option.text.trim().toLowerCase() === data.category.toLowerCase()) {
                categorySelect.value = option.value;
                break;
            }
        }
    }
});
</script>

</script>
 <script>
document.querySelector('input[name="photo"]').addEventListener("change", () => {
    document.getElementById("aiToggle").checked = false;
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.querySelector("form");

    form.addEventListener("submit", function (e) {

        let valid = true;

        // Inputs
        const name = form.name;
        const description = form.description;
        const photo = form.photo;
        const location = form.location;
        const latitude = form.latitude;
        const longitude = form.longitude;
        const category = form.category_id;
        const status = form.status;
        const date = form.date_reported;

        // Clear old errors
        document.querySelectorAll(".invalid-feedback").forEach(el => el.remove());
        document.querySelectorAll(".is-invalid").forEach(el => el.classList.remove("is-invalid"));

        function showError(input, message) {
            input.classList.add("is-invalid");

            const error = document.createElement("div");
            error.className = "invalid-feedback";
            error.innerText = message;

            input.parentNode.appendChild(error);
        }

        // NAME
        if (name.value.trim().length < 3) {
            showError(name, "Item name must be at least 3 characters");
            valid = false;
        }

        // DESCRIPTION
        if (description.value.trim().length < 10) {
            showError(description, "Description must be at least 10 characters");
            valid = false;
        }

        // PHOTO (optional but validated if present)
        if (photo.files.length > 0) {
            const file = photo.files[0];
            const allowed = ["image/jpeg", "image/png", "image/webp"];
            const maxSize = 2 * 1024 * 1024;

            if (!allowed.includes(file.type)) {
                showError(photo, "Only JPG, PNG, WEBP allowed");
                valid = false;
            } else if (file.size > maxSize) {
                showError(photo, "Max size is 2MB");
                valid = false;
            }
        }

        // LOCATION TEXT
        if (location.value.trim().length < 3) {
            showError(location, "Enter a valid location");
            valid = false;
        }

        // MAP LAT LNG REQUIRED
        if (!latitude.value || !longitude.value) {
            showError(latitude, "Select location from map");
            valid = false;
        }

        // CATEGORY
        if (!category.value) {
            showError(category, "Please select category");
            valid = false;
        }

        // STATUS
        if (!status.value) {
            showError(status, "Please select status");
            valid = false;
        }

        // DATE (no future)
        if (date.value) {
            const selected = new Date(date.value);
            const today = new Date();
            today.setHours(0,0,0,0);

            if (selected > today) {
                showError(date, "Future date not allowed");
                valid = false;
            }
        }

        // STOP SUBMIT
        if (!valid) {
            e.preventDefault();
        }

    });

});
</script>
{% endblock %}
