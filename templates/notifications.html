{% extends "base.html" %}

{% block content %}
  <div class="notifications-container">
    <h2 class="notifications-header">🔔 Your Notifications</h2>

    <div class="notifications-list" id="notifications-list">
      {% for n in notifications %}
        <div class="notification-card {{ 'unread' if not n.read else 'read' }}" id="notif-{{ n.id }}">
          <a href="{{ n.url or '#' }}" class="notification-link">
            <div class="notification-content">
              <div class="notification-icon">
                <i class="fas fa-bell"></i>
              </div>
              <div class="notification-text">
                <p>{{ n.message }}</p>
                <small>{{ n.timestamp.strftime('%Y-%m-%d %H:%M') }}</small>
              </div>
            </div>
          </a>
		    <button class="delete-notif-btn btn btn-sm btn-danger" data-id="{{ n.id }}" title="Delete">&times;</button>
        </div>
      {% endfor %}
    </div>

    {% if has_more %}
      <button id="load-more-btn" class="load-more-btn">Load More</button>
    {% endif %}
  </div>

  <style>
  <style>

    .notifications-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .notifications-header {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    .notifications-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .notification-card {
      background-color: #fff;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    .notification-card.unread {
      border-left: 5px solid #4CAF50;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .notification-card.read {
      border-left: 5px solid #ddd;
      color: #888;
    }

    .notification-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .notification-link {
      text-decoration: none;
      color: inherit;
      width: 100%;
    }

    .notification-content {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    .notification-icon {
      font-size: 2rem;
      color: #4CAF50;
    }

    .notification-text {
      flex-grow: 1;
    }

    .notification-text p {
      margin: 0;
      font-size: 1rem;
      font-weight: 400;
      color: #333;
    }

    .notification-text small {
      display: block;
      margin-top: 5px;
      font-size: 0.8rem;
      color: #666;
    }

    .load-more-btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      display: block;
      margin: 20px auto;
      transition: background-color 0.3s;
    }

    .load-more-btn:hover {
      background-color: #45a049;
    }

    .no-notifications {
      text-align: center;
      color: #888;
      font-size: 1.2rem;
    }
  </style>

  <!-- Include Font Awesome for the notification icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      let lastTimestamp = "{{ notifications[-1].timestamp if notifications else '' }}"; // Get the timestamp of the last notification

      // "Load More" button click handler
      $('#load-more-btn').on('click', function() {
        // Hide the Load More button immediately
        $(this).hide();

        $.ajax({
          url: '/notifications/load_more?last_timestamp=' + lastTimestamp,
          type: 'GET',
          dataType: 'json',
       success: function(response) {
    // Append new notifications to the list
    let notificationsHtml = '';
    response.notifications.forEach(function(notification) {
        notificationsHtml += `
            <div class="notification-card ${notification.read ? 'read' : 'unread'}" id="notif-${notification.id}">
                <a href="${notification.url || '#'}" class="notification-link">
                    <div class="notification-content">
                        <div class="notification-icon">
                            <i class="fas fa-bell"></i>
                        </div>
                        <div class="notification-text">
                            <p>${notification.message}</p>
                            <small>${notification.timestamp}</small>
                        </div>
                    </div>
                </a>
                <!-- Delete button -->
                <button class="delete-notif-btn btn btn-sm btn-danger" data-id="${notification.id}" title="Delete">&times;</button>
            </div>
        `;
    });
    $('#notifications-list').append(notificationsHtml);

    // Update the last timestamp for the next load
    if (response.notifications.length > 0) {
        lastTimestamp = response.notifications[response.notifications.length - 1].timestamp;
    }

    // Show the "Load More" button if there are more notifications
    if (response.has_more) {
        $('#load-more-btn').show();
    } else {
        $('#load-more-btn').hide(); // Hide button when no more notifications
    }
},
          error: function() {
            console.log('Error loading notifications');
          }
        });
      });
    });
  </script>
<style>
  /* Dark mode styles */
  body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
  }

  body.dark-mode .notifications-container {
    background-color: #1e1e1e;
    border-color: #333;
  }

  body.dark-mode .notifications-header {
    color: #fff;
  }

  body.dark-mode .notification-card {
    background-color: #1f1f1f;
    border-color: #333;
    color: #e0e0e0;
  }

  body.dark-mode .notification-card.unread {
    border-left: 5px solid #81c784; /* softer green for dark bg */
    box-shadow: 0 4px 10px rgba(255, 255, 255, 0.05);
  }

  body.dark-mode .notification-card.read {
    border-left: 5px solid #555;
    color: #aaa;
  }

  body.dark-mode .notification-card:hover {
    box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
  }

  body.dark-mode .notification-text p,
  body.dark-mode .notification-text small {
    color: #e0e0e0;
  }

  body.dark-mode .notification-icon {
    color: #81c784;
  }

  body.dark-mode .load-more-btn {
    background-color: #81c784;
    color: #121212;
  }

  body.dark-mode .load-more-btn:hover {
    background-color: #6fa66f;
  }

  body.dark-mode .no-notifications {
    color: #aaa;
  }

  /* Optional: smooth transition */
  body,
  .notification-card,
  .notifications-container,
  .load-more-btn {
    transition: all 0.3s ease;
  }
</style>
<script>
$(document).on('click', '.delete-notif-btn', function(e) {
    e.preventDefault();
    const notifId = $(this).data('id');
    const card = $('#notif-' + notifId); // this matches the new id

    $.ajax({
        url: '/notifications/delete/' + notifId,
        type: 'POST',
        success: function(response) {
            if (response.success) {
                card.fadeOut(300, function() { $(this).remove(); });
            }
        },
        error: function() {
            alert('Failed to delete notification.');
        }
    });
});
</script>
{% endblock %}
